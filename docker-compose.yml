# Servicios Rust y PHP con las mismas variables de entorno (un solo archivo: rust/.env).
# Uso (desde la raíz del repo):
#   cp .env.example rust/.env   # o copiá rust/.env.example; editá API_TOKEN
#   docker compose up -d --build
#
# Puertos: Rust http://localhost:8080  |  PHP http://localhost:8081
# Loadtest:  loadtest/k6/README.md

services:
  image_proccesor_rust:
    build:
      context: ./rust
      dockerfile: Dockerfile
    image: image_proccesor_rust:latest
    container_name: image_proccesor_rust
    env_file:
      - ./rust/.env
    ports:
      - "8080:8080"
    environment:
      BIND_ADDR: 0.0.0.0:8080
      OUTPUT_DIR: /data/images
    volumes:
      - ./data/rust:/data/images
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  image_proccesor_php:
    build:
      context: ./php
      dockerfile: Dockerfile
    image: image_proccesor_php:latest
    container_name: image_proccesor_php
    env_file:
      - ./rust/.env
    ports:
      - "8081:8080"
    environment:
      BIND_ADDR: 0.0.0.0:8080
      OUTPUT_DIR: /data/images
    volumes:
      - ./data/php:/data/images
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
